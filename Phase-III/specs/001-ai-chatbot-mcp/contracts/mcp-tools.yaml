## MCP Server Implementation

### Server Setup

```python
# backend/src/mcp/server.py
from mcp import Server
from mcp.types import Tool, TextContent
from typing import Any, Sequence

# Initialize MCP server
mcp_server = Server("todo-mcp-server")

# Register tools
@mcp_server.list_tools()
async def list_tools() -> list[Tool]:
    """List all available MCP tools"""
    return [
        Tool(
            name="add_task",
            description="Create a new task for the user",
            inputSchema={
                "type": "object",
                "properties": {
                    "user_id": {"type": "integer", "description": "User ID from JWT token"},
                    "title": {"type": "string", "description": "Task title", "minLength": 1, "maxLength": 255},
                    "description": {"type": "string", "description": "Task description (optional)", "maxLength": 10000}
                },
                "required": ["user_id", "title"]
            }
        ),
        Tool(
            name="list_tasks",
            description="List all tasks for the user",
            inputSchema={
                "type": "object",
                "properties": {
                    "user_id": {"type": "integer", "description": "User ID from JWT token"},
                    "status": {"type": "string", "enum": ["completed", "incomplete"], "description": "Filter by status (optional)"}
                },
                "required": ["user_id"]
            }
        ),
        Tool(
            name="complete_task",
            description="Mark a task as complete",
            inputSchema={
                "type": "object",
                "properties": {
                    "user_id": {"type": "integer", "description": "User ID from JWT token"},
                    "task_id": {"type": "integer", "description": "Task ID to complete"}
                },
                "required": ["user_id", "task_id"]
            }
        ),
        Tool(
            name="delete_task",
            description="Delete a task permanently",
            inputSchema={
                "type": "object",
                "properties": {
                    "user_id": {"type": "integer", "description": "User ID from JWT token"},
                    "task_id": {"type": "integer", "description": "Task ID to delete"}
                },
                "required": ["user_id", "task_id"]
            }
        ),
        Tool(
            name="update_task",
            description="Update task title and/or description",
            inputSchema={
                "type": "object",
                "properties": {
                    "user_id": {"type": "integer", "description": "User ID from JWT token"},
                    "task_id": {"type": "integer", "description": "Task ID to update"},
                    "title": {"type": "string", "description": "New title (optional)", "minLength": 1, "maxLength": 255},
                    "description": {"type": "string", "description": "New description (optional)", "maxLength": 10000}
                },
                "required": ["user_id", "task_id"]
            }
        )
    ]

@mcp_server.call_tool()
async def call_tool(name: str, arguments: dict[str, Any]) -> Sequence[TextContent]:
    """Handle tool invocations"""
    if name == "add_task":
        result = await add_task(**arguments)
    elif name == "list_tasks":
        result = await list_tasks(**arguments)
    elif name == "complete_task":
        result = await complete_task(**arguments)
    elif name == "delete_task":
        result = await delete_task(**arguments)
    elif name == "update_task":
        result = await update_task(**arguments)
    else:
        raise ValueError(f"Unknown tool: {name}")

    return [TextContent(type="text", text=json.dumps(result))]
```

