### 2. list_tasks

**Purpose**: Retrieve all tasks for the user, optionally filtered by completion status.

**Function Signature**:
```python
async def list_tasks(
    user_id: int,
    status: Optional[str] = None
) -> Dict[str, Any]:
    """
    List all tasks for the user.

    Args:
        user_id: ID of the user (from JWT token)
        status: Optional filter - "completed", "incomplete", or None (all tasks)

    Returns:
        Dict containing list of tasks:
        {
            "success": true,
            "tasks": [
                {
                    "id": 123,
                    "title": "Buy milk",
                    "is_completed": false,
                    ...
                },
                ...
            ],
            "count": 5
        }

    Raises:
        ValueError: If status is invalid
        DatabaseError: If database operation fails
    """
```

**Input Schema**:
```python
from typing import Literal

class ListTasksInput(BaseModel):
    user_id: int = Field(..., description="User ID from JWT token", gt=0)
    status: Optional[Literal["completed", "incomplete"]] = Field(
        None,
        description="Filter by completion status"
    )

    class Config:
        json_schema_extra = {
            "examples": [
                {"user_id": 123, "status": None},
                {"user_id": 123, "status": "incomplete"},
                {"user_id": 123, "status": "completed"}
            ]
        }
```

**Output Schema**:
```python
class ListTasksOutput(BaseModel):
    success: bool
    tasks: List[TaskOutput]
    count: int
```

**Error Responses**:
```python
# Invalid status
{
    "success": false,
    "error": "Status must be 'completed', 'incomplete', or null",
    "error_code": "INVALID_INPUT"
}

# Database error
{
    "success": false,
    "error": "Failed to retrieve tasks",
    "error_code": "DATABASE_ERROR"
}
```

**Example Usage**:
```python
# List all tasks
result = await list_tasks(user_id=123, status=None)

# List incomplete tasks only
result = await list_tasks(user_id=123, status="incomplete")

# Agent receives response
{
    "success": true,
    "tasks": [
        {
            "id": 1,
            "title": "Buy milk",
            "is_completed": false,
            ...
        },
        {
            "id": 2,
            "title": "Call mom",
            "is_completed": false,
            ...
        },
        {
            "id": 3,
            "title": "Pay bills",
            "is_completed": true,
            ...
        }
    ],
    "count": 3
}

# Agent generates natural language response
"You have 3 tasks:
1. Buy milk (incomplete)
2. Call mom (incomplete)
3. Pay bills (completed)"
```

