# MCP Tools Specification

**Feature**: 001-ai-chatbot-mcp
**Date**: 2026-02-28
**Status**: Phase 1 Design
**Related**: [spec.md](../spec.md) | [plan.md](../plan.md) | [data-model.md](../data-model.md)

## Overview

This document defines the Model Context Protocol (MCP) tools that enable the AI agent to perform task operations. These tools provide a structured interface between the OpenAI agent and the backend task management system.

**Design Principles**:
- Stateless: Tools hold no state between invocations
- User Isolation: All tools require user_id parameter
- Type Safety: Pydantic schemas for all parameters
- Error Handling: Structured error responses
- Idempotent: Safe to retry on failure

---

## Tool Catalog

| Tool Name | Purpose | Parameters | Returns |
|-----------|---------|------------|---------|
| add_task | Create a new task | user_id, title, description? | Task object |
| list_tasks | List user's tasks | user_id, status? | List of tasks |
| complete_task | Mark task as complete | user_id, task_id | Task object |
| delete_task | Delete a task | user_id, task_id | Success message |
| update_task | Update task details | user_id, task_id, title?, description? | Task object |

---

## Tool Definitions

### 1. add_task

**Purpose**: Create a new task for the user.

**Function Signature**:
```python
async def add_task(
    user_id: int,
    title: str,
    description: Optional[str] = None
) -> Dict[str, Any]:
    """
    Create a new task for the user.

    Args:
        user_id: ID of the user (from JWT token)
        title: Task title (required, 1-255 characters)
        description: Optional task description (max 10,000 characters)

    Returns:
        Dict containing task details:
        {
            "success": true,
            "task": {
                "id": 123,
                "user_id": 456,
                "title": "Buy milk",
                "description": "Get 2% milk from store",
                "is_completed": false,
                "created_at": "2026-02-28T10:30:00Z",
                "updated_at": "2026-02-28T10:30:00Z",
                "completed_at": null
            }
        }

    Raises:
        ValueError: If title is empty or too long
        DatabaseError: If database operation fails
    """
```

**Input Schema** (Pydantic):
```python
from pydantic import BaseModel, Field
from typing import Optional

class AddTaskInput(BaseModel):
    user_id: int = Field(..., description="User ID from JWT token", gt=0)
    title: str = Field(..., description="Task title", min_length=1, max_length=255)
    description: Optional[str] = Field(None, description="Task description", max_length=10000)

    class Config:
        json_schema_extra = {
            "examples": [
                {
                    "user_id": 123,
                    "title": "Buy milk",
                    "description": "Get 2% milk from the grocery store"
                }
            ]
        }
```

**Output Schema**:
```python
class TaskOutput(BaseModel):
    id: int
    user_id: int
    title: str
    description: Optional[str]
    is_completed: bool
    created_at: str  # ISO 8601 format
    updated_at: str  # ISO 8601 format
    completed_at: Optional[str]  # ISO 8601 format

class AddTaskOutput(BaseModel):
    success: bool
    task: TaskOutput
```

**Error Responses**:
```python
# Empty title
{
    "success": false,
    "error": "Title cannot be empty",
    "error_code": "INVALID_INPUT"
}

# Title too long
{
    "success": false,
    "error": "Title must be 255 characters or less",
    "error_code": "INVALID_INPUT"
}

# Database error
{
    "success": false,
    "error": "Failed to create task",
    "error_code": "DATABASE_ERROR"
}
```

**Example Usage**:
```python
# Agent invokes tool
result = await add_task(
    user_id=123,
    title="Buy milk",
    description="Get 2% milk from store"
)

# Agent receives response
{
    "success": true,
    "task": {
        "id": 456,
        "user_id": 123,
        "title": "Buy milk",
        "description": "Get 2% milk from store",
        "is_completed": false,
        "created_at": "2026-02-28T10:30:00Z",
        "updated_at": "2026-02-28T10:30:00Z",
        "completed_at": null
    }
}

# Agent generates natural language response
"I've added 'Buy milk' to your task list!"
```

