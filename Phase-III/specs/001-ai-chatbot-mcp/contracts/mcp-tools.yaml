## Testing Strategy

### Unit Tests

```python
# tests/test_mcp_tools.py
import pytest
from backend.src.mcp.tools import add_task, list_tasks, complete_task

@pytest.mark.asyncio
async def test_add_task_success(db_session):
    """Test successful task creation"""
    result = await add_task(user_id=1, title="Buy milk", description="2% milk")
    assert result["success"] is True
    assert result["task"]["title"] == "Buy milk"
    assert result["task"]["user_id"] == 1

@pytest.mark.asyncio
async def test_add_task_empty_title(db_session):
    """Test task creation with empty title"""
    result = await add_task(user_id=1, title="")
    assert result["success"] is False
    assert result["error_code"] == "INVALID_INPUT"

@pytest.mark.asyncio
async def test_list_tasks_with_filter(db_session):
    """Test listing tasks with status filter"""
    # Create tasks
    await add_task(user_id=1, title="Task 1")
    await add_task(user_id=1, title="Task 2")
    await complete_task(user_id=1, task_id=1)

    # List incomplete tasks
    result = await list_tasks(user_id=1, status="incomplete")
    assert result["success"] is True
    assert result["count"] == 1
    assert result["tasks"][0]["title"] == "Task 2"

@pytest.mark.asyncio
async def test_complete_task_not_found(db_session):
    """Test completing non-existent task"""
    result = await complete_task(user_id=1, task_id=999)
    assert result["success"] is False
    assert result["error_code"] == "NOT_FOUND"

@pytest.mark.asyncio
async def test_user_isolation(db_session):
    """Test user cannot access other user's tasks"""
    # User 1 creates task
    task = await add_task(user_id=1, title="User 1 task")
    task_id = task["task"]["id"]

    # User 2 tries to complete it
    result = await complete_task(user_id=2, task_id=task_id)
    assert result["success"] is False
    assert result["error_code"] == "NOT_FOUND"
```

