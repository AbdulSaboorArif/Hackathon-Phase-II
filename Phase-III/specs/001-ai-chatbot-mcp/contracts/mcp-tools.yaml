### 3. complete_task

**Purpose**: Mark a task as complete.

**Function Signature**:
```python
async def complete_task(
    user_id: int,
    task_id: int
) -> Dict[str, Any]:
    """
    Mark a task as complete.

    Args:
        user_id: ID of the user (from JWT token)
        task_id: ID of the task to complete

    Returns:
        Dict containing updated task:
        {
            "success": true,
            "task": {
                "id": 123,
                "is_completed": true,
                "completed_at": "2026-02-28T10:30:00Z",
                ...
            }
        }

    Raises:
        NotFoundError: If task not found or not owned by user
        DatabaseError: If database operation fails
    """
```

**Input Schema**:
```python
class CompleteTaskInput(BaseModel):
    user_id: int = Field(..., description="User ID from JWT token", gt=0)
    task_id: int = Field(..., description="Task ID to complete", gt=0)

    class Config:
        json_schema_extra = {
            "examples": [
                {"user_id": 123, "task_id": 456}
            ]
        }
```

**Output Schema**:
```python
class CompleteTaskOutput(BaseModel):
    success: bool
    task: TaskOutput
```

**Error Responses**:
```python
# Task not found
{
    "success": false,
    "error": "Task not found",
    "error_code": "NOT_FOUND"
}

# Task not owned by user
{
    "success": false,
    "error": "Task not found",  # Don't leak existence
    "error_code": "NOT_FOUND"
}

# Database error
{
    "success": false,
    "error": "Failed to complete task",
    "error_code": "DATABASE_ERROR"
}
```

**Example Usage**:
```python
# Complete task
result = await complete_task(user_id=123, task_id=456)

# Agent receives response
{
    "success": true,
    "task": {
        "id": 456,
        "title": "Buy milk",
        "is_completed": true,
        "completed_at": "2026-02-28T10:30:00Z",
        ...
    }
}

# Agent generates natural language response
"Great! I've marked 'Buy milk' as complete."
```

