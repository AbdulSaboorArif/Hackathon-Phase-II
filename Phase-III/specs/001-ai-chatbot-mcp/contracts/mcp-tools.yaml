### 5. update_task

**Purpose**: Update task title and/or description.

**Function Signature**:
```python
async def update_task(
    user_id: int,
    task_id: int,
    title: Optional[str] = None,
    description: Optional[str] = None
) -> Dict[str, Any]:
    """
    Update task title and/or description.

    Args:
        user_id: ID of the user (from JWT token)
        task_id: ID of the task to update
        title: New title (optional, 1-255 characters)
        description: New description (optional, max 10,000 characters)

    Returns:
        Dict containing updated task:
        {
            "success": true,
            "task": {
                "id": 123,
                "title": "Buy 2% milk",
                "description": "Updated description",
                ...
            }
        }

    Raises:
        ValueError: If both title and description are None
        ValueError: If title is empty or too long
        NotFoundError: If task not found or not owned by user
        DatabaseError: If database operation fails
    """
```

**Input Schema**:
```python
class UpdateTaskInput(BaseModel):
    user_id: int = Field(..., description="User ID from JWT token", gt=0)
    task_id: int = Field(..., description="Task ID to update", gt=0)
    title: Optional[str] = Field(None, description="New task title", min_length=1, max_length=255)
    description: Optional[str] = Field(None, description="New task description", max_length=10000)

    @validator('title', 'description')
    def at_least_one_field(cls, v, values):
        if 'title' in values and values['title'] is None and v is None:
            raise ValueError('At least one of title or description must be provided')
        return v

    class Config:
        json_schema_extra = {
            "examples": [
                {"user_id": 123, "task_id": 456, "title": "Buy 2% milk"},
                {"user_id": 123, "task_id": 456, "description": "Get from Whole Foods"},
                {"user_id": 123, "task_id": 456, "title": "Buy 2% milk", "description": "Get from Whole Foods"}
            ]
        }
```

**Output Schema**:
```python
class UpdateTaskOutput(BaseModel):
    success: bool
    task: TaskOutput
```

**Error Responses**:
```python
# No fields provided
{
    "success": false,
    "error": "At least one of title or description must be provided",
    "error_code": "INVALID_INPUT"
}

# Empty title
{
    "success": false,
    "error": "Title cannot be empty",
    "error_code": "INVALID_INPUT"
}

# Task not found
{
    "success": false,
    "error": "Task not found",
    "error_code": "NOT_FOUND"
}

# Database error
{
    "success": false,
    "error": "Failed to update task",
    "error_code": "DATABASE_ERROR"
}
```

**Example Usage**:
```python
# Update title only
result = await update_task(user_id=123, task_id=456, title="Buy 2% milk")

# Update description only
result = await update_task(user_id=123, task_id=456, description="Get from Whole Foods")

# Update both
result = await update_task(
    user_id=123,
    task_id=456,
    title="Buy 2% milk",
    description="Get from Whole Foods"
)

# Agent receives response
{
    "success": true,
    "task": {
        "id": 456,
        "title": "Buy 2% milk",
        "description": "Get from Whole Foods",
        ...
    }
}

# Agent generates natural language response
"I've updated the task to 'Buy 2% milk'."
```

