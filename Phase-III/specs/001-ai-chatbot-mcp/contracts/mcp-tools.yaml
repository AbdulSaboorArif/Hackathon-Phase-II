## Error Handling Strategy

### Error Codes

| Code | Description | HTTP Status | User Message |
|------|-------------|-------------|--------------|
| INVALID_INPUT | Invalid parameters | 400 | "Invalid input: {details}" |
| NOT_FOUND | Task not found | 404 | "Task not found" |
| DATABASE_ERROR | Database operation failed | 500 | "Something went wrong. Please try again." |
| UNAUTHORIZED | User not authorized | 403 | "You don't have permission to access this task" |

### Error Response Format

```python
{
    "success": false,
    "error": "Human-readable error message",
    "error_code": "ERROR_CODE",
    "details": {  # Optional, for debugging
        "field": "title",
        "constraint": "max_length",
        "value": 300
    }
}
```

