## Tool Integration with OpenAI Agent

### Agent Configuration

```python
# backend/src/agent/config.py
from openai import OpenAI

client = OpenAI(api_key=os.getenv("OPENAI_API_KEY"))

# Create agent with MCP tools
agent = client.beta.assistants.create(
    name="Todo Assistant",
    instructions="""You are a helpful assistant that manages todo tasks.
    You have access to tools to add, list, complete, delete, and update tasks.
    Always confirm actions with natural language responses.
    Be friendly and concise.""",
    model="gpt-4",
    tools=[
        {"type": "function", "function": tool_to_openai_function(tool)}
        for tool in await mcp_server.list_tools()
    ]
)
```

### Agent Execution

```python
# backend/src/agent/runner.py
async def run_agent_with_tools(
    messages: List[Dict[str, str]],
    user_id: int
) -> str:
    """Run agent with MCP tools"""
    # Create thread
    thread = client.beta.threads.create()

    # Add messages to thread
    for msg in messages:
        client.beta.threads.messages.create(
            thread_id=thread.id,
            role=msg["role"],
            content=msg["content"]
        )

    # Run agent
    run = client.beta.threads.runs.create(
        thread_id=thread.id,
        assistant_id=agent.id
    )

    # Wait for completion and handle tool calls
    while run.status in ["queued", "in_progress", "requires_action"]:
        if run.status == "requires_action":
            # Agent wants to call a tool
            tool_calls = run.required_action.submit_tool_outputs.tool_calls

            tool_outputs = []
            for tool_call in tool_calls:
                # Add user_id to arguments
                arguments = json.loads(tool_call.function.arguments)
                arguments["user_id"] = user_id

                # Call MCP tool
                result = await mcp_server.call_tool(
                    tool_call.function.name,
                    arguments
                )

                tool_outputs.append({
                    "tool_call_id": tool_call.id,
                    "output": result[0].text
                })

            # Submit tool outputs
            run = client.beta.threads.runs.submit_tool_outputs(
                thread_id=thread.id,
                run_id=run.id,
                tool_outputs=tool_outputs
            )

        # Poll for updates
        await asyncio.sleep(0.5)
        run = client.beta.threads.runs.retrieve(thread_id=thread.id, run_id=run.id)

    # Get final response
    messages = client.beta.threads.messages.list(thread_id=thread.id)
    return messages.data[0].content[0].text.value
```

